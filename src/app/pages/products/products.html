<app-header></app-header>

<!-- Page Header -->
<section class="page-hero">
  <div class="page-hero-content">
    <span class="page-eyebrow">PRESTIGE COLLECTIONS</span>
    <h1>{{ activeCategory ? activeCategory.name : 'All Products' }}</h1>
    <p *ngIf="!activeCategory">Discover our full range of premium clothing and accessories.</p>
    <p *ngIf="activeCategory">{{ products.length }} items in this collection.</p>
  </div>
</section>

<!-- Filter Bar -->
<div class="filter-bar">
  <div class="filter-inner">
    <ng-container *ngIf="categoriesLoading; else categoryFilters">
      <span class="skeleton-chip" *ngFor="let _ of categorySkeletons"></span>
    </ng-container>
    <ng-template #categoryFilters>
    <button
      class="filter-chip"
      [class.active]="!activeSlug"
      (click)="selectCategory(null)">
      All
    </button>
    <button
      class="filter-chip"
      *ngFor="let cat of categories"
      [class.active]="activeSlug === cat.slug"
      (click)="selectCategory(cat.slug)">
      {{ cat.name }}
    </button>
    </ng-template>
  </div>
</div>

<!-- Error -->
<div *ngIf="error" class="error-box">
  <p>{{ error }}</p>
</div>

<!-- Products Grid -->
<section *ngIf="!error" class="products-section">
  <div class="products-container">
    <div *ngIf="loading" class="products-grid skeleton-product-grid">
      <div class="skeleton-product-card" *ngFor="let _ of productSkeletons">
        <div class="skeleton-block skeleton-product-image"></div>
        <div class="skeleton-product-body">
          <span class="skeleton-block skeleton-text skeleton-text-sm"></span>
          <span class="skeleton-block skeleton-text skeleton-text-md"></span>
          <span class="skeleton-block skeleton-text skeleton-text-xs"></span>
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <div *ngIf="!loading && products.length === 0" class="empty-state">
      <svg xmlns="http://www.w3.org/2000/svg" width="52" height="52" viewBox="0 0 24 24"
        fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <p>No products found in this category.</p>
      <button class="btn-clear" (click)="selectCategory(null)">View All Products</button>
    </div>

    <!-- Grid -->
    <div class="products-grid" *ngIf="!loading && products.length > 0">
      <app-product-card
        *ngFor="let product of products"
        [product]="product"
        (viewDetails)="onViewDetails($event)"
        (addToCart)="onAddToCart($event)">
      </app-product-card>
    </div>

  </div>
</section>

<app-footer></app-footer>
