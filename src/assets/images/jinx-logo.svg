<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="50%" stop-color="#FDB931" />
      <stop offset="100%" stop-color="#9f7928" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Outer Hexagon -->
  <polygon points="60,10 105,35 105,85 60,110 15,85 15,35" fill="none" stroke="url(#goldGrad)" stroke-width="4" filter="url(#glow)"/>
  <!-- Inner Hexagon -->
  <polygon points="60,20 95,40 95,80 60,100 25,80 25,40" fill="none" stroke="url(#goldGrad)" stroke-width="2"/>
  
  <!-- "J" -->
  <path d="M 45 40 L 60 40 M 52 40 L 52 75 C 52 85 40 85 35 80" stroke="url(#goldGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- "T" -->
  <path d="M 65 55 L 85 55 M 75 55 L 75 85" stroke="url(#goldGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
